name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    # Required by the Release step to create releases / upload assets.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '8.0.x'

      # Builds the net462 plugin (reference assemblies come from NuGet) and the
      # net8 core, then zips the runtime files into dist/*.qlplugin.
      # QuickLook.Common.dll and libdeflate.dll are vendored in the repo, so no
      # QuickLook install is needed on the runner.
      - name: Build & package
        shell: pwsh
        run: |
          # On a v* tag, stamp that version into the plugin metadata.
          $v = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF_NAME } else { '' }
          if ($v) { ./Package.ps1 -Dotnet dotnet -Version $v }
          else    { ./Package.ps1 -Dotnet dotnet }

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: QuickLook.Plugin.MIQ
          path: dist/*.qlplugin

      # On a v* tag, publish the .qlplugin as a GitHub Release asset.
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*.qlplugin
